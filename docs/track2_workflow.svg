<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="Helvetica, Arial, sans-serif">
  <rect width="1000" height="660" fill="#ffffff"/>

  <!-- header -->
  <text x="30" y="40" font-size="23" font-weight="700" fill="#1f2d3d">RuuPhenome · Track 2 — two tables to honest, explainable NCD screening</text>
  <text x="30" y="63" font-size="12.5" fill="#5a6b7b">Open data · leakage-safe · fits fresh per upload (no training, no GPU) · on-premise (data never leaves the institute)</text>

  <!-- inputs + engine -->
  <rect x="30" y="86" width="250" height="52" rx="8" fill="#eef2f7" stroke="#c9d6e5"/>
  <text x="44" y="108" font-size="13" font-weight="700" fill="#1f2d3d">Table 1 — concentrations</text>
  <text x="44" y="126" font-size="11.5" fill="#5a6b7b">metabolites × samples (NMR MAF)</text>
  <rect x="300" y="86" width="250" height="52" rx="8" fill="#eef2f7" stroke="#c9d6e5"/>
  <text x="314" y="108" font-size="13" font-weight="700" fill="#1f2d3d">Table 2 — metadata</text>
  <text x="314" y="126" font-size="11.5" fill="#5a6b7b">per-sample condition / covariates</text>
  <text x="586" y="120" font-size="26" fill="#2e6da4">&#8594;</text>
  <rect x="630" y="86" width="340" height="52" rx="8" fill="#2e6da4"/>
  <text x="800" y="108" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">RuuPhenome Track 2 engine</text>
  <text x="800" y="126" font-size="10.5" fill="#dbe7f5" text-anchor="middle">nested CV · BH-FDR · permutation test · bootstrap 95% CI</text>

  <!-- lane 1 -->
  <circle cx="50" cy="198" r="16" fill="#2b7a78"/><text x="50" y="203" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <rect x="80" y="170" width="430" height="56" rx="8" fill="#f2f7fb" stroke="#c9d6e5"/>
  <text x="96" y="193" font-size="14" font-weight="700" fill="#1f2d3d">Biomarker Discovery</text>
  <text x="96" y="212" font-size="11.5" fill="#5a6b7b">smallest stable panel + top-1/3/5/10 sweep</text>
  <text x="525" y="204" font-size="20" fill="#2e8b57">&#8594;</text>
  <rect x="555" y="170" width="230" height="56" rx="8" fill="#e6f4ea" stroke="#2e8b57"/>
  <text x="568" y="193" font-size="12.5" font-weight="700" fill="#1f6b3a">Minimal panel (2–5 metabolites)</text>
  <text x="568" y="212" font-size="11" fill="#3a5a45">+ honest AUC &amp; 95% CI</text>
  <text x="800" y="194" font-size="11" fill="#5a6b7b">Impact</text>
  <text x="800" y="212" font-size="11.5" fill="#1f2d3d">cheaper, explainable screen</text>

  <!-- lane 2 -->
  <circle cx="50" cy="278" r="16" fill="#2b7a78"/><text x="50" y="283" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <rect x="80" y="250" width="430" height="56" rx="8" fill="#f2f7fb" stroke="#c9d6e5"/>
  <text x="96" y="273" font-size="14" font-weight="700" fill="#1f2d3d">Predictive Model</text>
  <text x="96" y="292" font-size="11.5" fill="#5a6b7b">nested grouped CV · EN/SVM/RF/HGB/XGB</text>
  <text x="525" y="284" font-size="20" fill="#2e8b57">&#8594;</text>
  <rect x="555" y="250" width="230" height="56" rx="8" fill="#e6f4ea" stroke="#2e8b57"/>
  <text x="568" y="273" font-size="12.5" font-weight="700" fill="#1f6b3a">Risk score + confusion matrix</text>
  <text x="568" y="292" font-size="11" fill="#3a5a45">binary &amp; multi-class</text>
  <text x="800" y="274" font-size="11" fill="#5a6b7b">Impact</text>
  <text x="800" y="292" font-size="11.5" fill="#1f2d3d">triage undiagnosed cases</text>

  <!-- lane 3 -->
  <circle cx="50" cy="358" r="16" fill="#2b7a78"/><text x="50" y="363" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <rect x="80" y="330" width="430" height="56" rx="8" fill="#f2f7fb" stroke="#c9d6e5"/>
  <text x="96" y="353" font-size="14" font-weight="700" fill="#1f2d3d">Differential Analysis</text>
  <text x="96" y="372" font-size="11.5" fill="#5a6b7b">fold-change + MWU/Kruskal · BH-FDR</text>
  <text x="525" y="364" font-size="20" fill="#2e8b57">&#8594;</text>
  <rect x="555" y="330" width="230" height="56" rx="8" fill="#e6f4ea" stroke="#2e8b57"/>
  <text x="568" y="353" font-size="12.5" font-weight="700" fill="#1f6b3a">Volcano + ranked q-values</text>
  <text x="568" y="372" font-size="11" fill="#3a5a45">whole-matrix, all metabolites</text>
  <text x="800" y="354" font-size="11" fill="#5a6b7b">Impact</text>
  <text x="800" y="372" font-size="11.5" fill="#1f2d3d">explains disease biology</text>

  <!-- lane 4 -->
  <circle cx="50" cy="438" r="16" fill="#2b7a78"/><text x="50" y="443" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <rect x="80" y="410" width="430" height="56" rx="8" fill="#f2f7fb" stroke="#c9d6e5"/>
  <text x="96" y="433" font-size="14" font-weight="700" fill="#1f2d3d">Correlation / GGM network</text>
  <text x="96" y="452" font-size="11.5" fill="#5a6b7b">partial correlation (Krumsiek 2011)</text>
  <text x="525" y="444" font-size="20" fill="#2e8b57">&#8594;</text>
  <rect x="555" y="410" width="230" height="56" rx="8" fill="#e6f4ea" stroke="#2e8b57"/>
  <text x="568" y="433" font-size="12.5" font-weight="700" fill="#1f6b3a">Metabolic network + clinical links</text>
  <text x="568" y="452" font-size="11" fill="#3a5a45">direct associations only</text>
  <text x="800" y="434" font-size="11" fill="#5a6b7b">Impact</text>
  <text x="800" y="452" font-size="11.5" fill="#1f2d3d">mechanism &amp; hypotheses</text>

  <!-- lane 5 -->
  <circle cx="50" cy="518" r="16" fill="#2b7a78"/><text x="50" y="523" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">5</text>
  <rect x="80" y="490" width="430" height="56" rx="8" fill="#f2f7fb" stroke="#c9d6e5"/>
  <text x="96" y="513" font-size="14" font-weight="700" fill="#1f2d3d">Feature Selection</text>
  <text x="96" y="532" font-size="11.5" fill="#5a6b7b">in-fold filter + Jaccard stability</text>
  <text x="525" y="524" font-size="20" fill="#2e8b57">&#8594;</text>
  <rect x="555" y="490" width="230" height="56" rx="8" fill="#e6f4ea" stroke="#2e8b57"/>
  <text x="568" y="513" font-size="12.5" font-weight="700" fill="#1f6b3a">Stable, leakage-safe features</text>
  <text x="568" y="532" font-size="11" fill="#3a5a45">selection frequency reported</text>
  <text x="800" y="514" font-size="11" fill="#5a6b7b">Impact</text>
  <text x="800" y="532" font-size="11.5" fill="#1f2d3d">small, reproducible test</text>

  <!-- honesty / impact banner -->
  <rect x="30" y="575" width="940" height="60" rx="10" fill="#eef7f0" stroke="#2e8b57"/>
  <text x="48" y="600" font-size="13" font-weight="700" fill="#1f6b3a">Honest by design</text>
  <text x="48" y="620" font-size="11.5" fill="#3a5a45">leakage-safe CV · 95% CI on every AUC · permutation p · BH-FDR · external cohort · research-use-only (not clinical)</text>
  <text x="640" y="600" font-size="13" font-weight="700" fill="#1f6b3a">Impact</text>
  <text x="640" y="620" font-size="11.5" fill="#3a5a45">free, open, on-prem alternative to Chenomx for scalable diabetes / hypertension screening</text>
</svg>
