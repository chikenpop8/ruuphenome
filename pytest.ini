[pytest]
# Tests import `from backend.nmr_api import ...`, so the directory that CONTAINS
# `backend/` (i.e. this one) must be on sys.path. Pinning it here means `pytest`
# collects correctly no matter which directory it is invoked from.
pythonpath = .
testpaths = backend/nmr_api/tests
filterwarnings =
    ignore::DeprecationWarning:nmrglue.*
